{% extends 'base.html' %}
{% block content %}
<div style="display: flex; justify-content: space-between; width: 100%; align-items: center; margin-bottom: 25px;">
    <h1 style="margin:0; font-size: 2rem;">Inventario de Ivonne</h1>
    <a href="{{ url_for('registrar') }}" class="btn">+ Agregar Item</a>
</div>

<div class="glass-card">
    <table style="width: 100%; border-collapse: collapse; text-align: left;">
        <thead>
            <tr style="border-bottom: 2px solid rgba(255,255,255,0.1);">
                <th style="padding: 15px;">Producto</th>
                <th>Categoría</th>
                <th>Precio</th>
                <th>Stock</th>
                <th style="text-align: center;">Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for p in productos %}
            <tr style="border-bottom: 1px solid rgba(255,255,255,0.05); transition: 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.02)'" onmouseout="this.style.background='transparent'">
                <td style="padding: 15px; font-weight: 600;">{{ p.nombre }}</td>
                <td><span style="background: rgba(79, 172, 254, 0.2); color: var(--primary); padding: 4px 10px; border-radius: 20px; font-size: 0.8rem;">{{ p.categoria }}</span></td>
                <td style="color: #4ade80; font-weight: 700;">${{ p.precio }}</td>
                <td>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <div style="width: 8px; height: 8px; border-radius: 50%; background: {{ 'red' if p.stock < 5 else '#4ade80' }}"></div>
                        {{ p.stock }}
                    </div>
                </td>
                <td style="text-align: center;">
                    <a href="{{ url_for('editar', id=p.id) }}" style="color: var(--primary); text-decoration: none; font-size: 0.9rem; font-weight: bold; margin-right: 15px;">Editar</a>
                    
                    <a href="{{ url_for('eliminar', id=p.id) }}" style="color: #ff4b2b; text-decoration: none; font-size: 0.9rem; font-weight: bold;" onclick="return confirm('¿Seguro que deseas eliminar este producto?')">Eliminar</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
