{% extends 'base.html' %}
{% block content %}
<div class="glass-card" style="max-width: 450px; margin: 0 auto; text-align: center;">
    <h2 style="margin-top: 0; color: var(--primary);">Editar Producto</h2>
    <form method="POST" style="display: flex; flex-direction: column; gap: 20px;">
        <input type="text" name="nombre" value="{{ producto.nombre }}" style="padding: 15px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white;" required>
        <input type="text" name="categoria" value="{{ producto.categoria }}" style="padding: 15px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white;" required>
        <div style="display: flex; gap: 10px;">
            <input type="number" step="0.01" name="precio" value="{{ producto.precio }}" style="flex: 1; padding: 15px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white;" required>
            <input type="number" name="stock" value="{{ producto.stock }}" style="flex: 1; padding: 15px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white;" required>
        </div>
        <button type="submit" class="btn" style="width: 100%;">ACTUALIZAR</button>
        <a href="{{ url_for('index') }}" style="color: #94a3b8; text-decoration: none;">Cancelar</a>
    </form>
</div>
{% endblock %}
