{% extends 'base.html' %}
{% block content %}
<div class="glass-card" style="max-width: 450px; margin: 0 auto; text-align: center;">
    <h2 style="margin-top: 0; color: var(--primary);">Nuevo Registro</h2>
    <p style="color: #94a3b8; margin-bottom: 30px;">Completa los datos del producto</p>

    <form method="POST" style="display: flex; flex-direction: column; gap: 20px;">
        <input type="text" name="nombre" placeholder="Nombre del producto" 
               style="padding: 15px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; outline: none;" required>
        
        <input type="text" name="categoria" placeholder="Categoría" 
               style="padding: 15px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; outline: none;" required>
        
        <div style="display: flex; gap: 10px;">
            <input type="number" step="0.01" name="precio" placeholder="Precio ($)" 
                   style="flex: 1; padding: 15px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; outline: none;" required>
            
            <input type="number" name="stock" placeholder="Stock" 
                   style="flex: 1; padding: 15px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; outline: none;" required>
        </div>

        <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">GURADAR PRODUCTO</button>
        <a href="{{ url_for('index') }}" style="color: #94a3b8; text-decoration: none; font-size: 0.9rem;">Cancelar y volver</a>
    </form>
</div>
{% endblock %}
